<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>추천 히스토리</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        nav { margin-bottom: 24px; }
        nav a { margin-right: 16px; color: #333; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; }
    </style>
</head>
<body>
    <nav>
        <a href="/">홈</a>
        <a href="/menus">메뉴 관리</a>
        <a href="/histories">히스토리</a>
    </nav>

    <h1>추천 히스토리</h1>

    <table>
        <thead>
            <tr>
                <th>날짜</th>
                <th>메뉴</th>
                <th>카테고리</th>
                <th>식사 시간</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="h : ${histories}">
                <td th:text="${h.recommendedAt}"></td>
                <td th:text="${h.menu.name}"></td>
                <td th:text="${h.menu.category.name}"></td>
                <td th:text="${h.menu.mealType.name}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(histories)}">
                <td colspan="4" style="text-align:center; color:#aaa;">히스토리가 없습니다.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
