<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메뉴 목록</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        nav { margin-bottom: 24px; }
        nav a { margin-right: 16px; color: #333; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .btn-edit { background: #4a90d9; color: white; text-decoration: none; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-add { background: #ff6b35; color: white; padding: 10px 20px; font-size: 1rem; text-decoration: none; border-radius: 6px; display: inline-block; margin-bottom: 16px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">홈</a>
        <a href="/menus">메뉴 관리</a>
        <a href="/histories">히스토리</a>
    </nav>

    <h1>메뉴 목록</h1>
    <a href="/menus/new" class="btn-add">+ 메뉴 추가</a>

    <table>
        <thead>
            <tr>
                <th>메뉴 이름</th>
                <th>카테고리</th>
                <th>식사 시간</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="menu : ${menus}">
                <td th:text="${menu.name}"></td>
                <td th:text="${menu.category.name}"></td>
                <td th:text="${menu.mealType.name}"></td>
                <td>
                    <a th:href="@{/menus/{id}/edit(id=${menu.id})}" class="btn btn-edit">수정</a>
                    <form th:action="@{/menus/{id}/delete(id=${menu.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-delete" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(menus)}">
                <td colspan="4" style="text-align:center; color:#aaa;">등록된 메뉴가 없습니다.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
